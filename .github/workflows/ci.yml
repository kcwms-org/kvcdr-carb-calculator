name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-lint-test:
    name: Build, lint, and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-registry-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-registry-

      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-target-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-target-

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq pkg-config

      - name: Build
        run: cargo build --locked

      - name: Lint (clippy)
        run: cargo clippy --locked -- -D warnings

      - name: Test
        run: cargo test --locked

  deploy:
    name: Build image and deploy to DigitalOcean
    runs-on: ubuntu-latest
    needs: build-lint-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 600

      - name: Build Docker image
        run: |
          docker build -t registry.digitalocean.com/kvcdr-registry/kvcdr-carb-calculator:latest .
          docker tag registry.digitalocean.com/kvcdr-registry/kvcdr-carb-calculator:latest \
            registry.digitalocean.com/kvcdr-registry/kvcdr-carb-calculator:${{ github.sha }}

      - name: Push Docker image
        run: |
          docker push registry.digitalocean.com/kvcdr-registry/kvcdr-carb-calculator:latest
          docker push registry.digitalocean.com/kvcdr-registry/kvcdr-carb-calculator:${{ github.sha }}

      - name: Deploy to droplet via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DROPLET_IP: ${{ secrets.DROPLET_IP }}
          DROPLET_HOST_KEY_BASE_64: ${{ secrets.DROPLET_HOST_KEY_BASE_64 }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          echo "$DROPLET_HOST_KEY_BASE_64" | base64 -d >> ~/.ssh/known_hosts
          ssh -i /tmp/deploy_key kevin@$DROPLET_IP \
            "doctl registry login --expiry-seconds 300 && \
             docker pull registry.digitalocean.com/kvcdr-registry/kvcdr-carb-calculator:latest && \
             docker stop kvcdr-carb-calculator || true && \
             docker rm kvcdr-carb-calculator || true && \
             docker run -d --name kvcdr-carb-calculator --restart unless-stopped \
               --env-file /opt/kvcdr-carb-calculator/.env \
               -p 3000:3000 \
               registry.digitalocean.com/kvcdr-registry/kvcdr-carb-calculator:latest"
          rm /tmp/deploy_key
