name: Write version file

on:
  push:
    branches: [main]

jobs:
  version:
    name: Write .version
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Write short SHA to .version
        run: git rev-parse --short HEAD > .version

      - name: Commit .version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .version
          git diff --cached --quiet || git commit -m "chore: update .version to $(cat .version) [skip ci]"
          git push
